server:
  port: ${SERVER_PORT:8081}
  forward-headers-strategy: framework

spring:
  application:
    name: ${SPRING_APPLICATION_NAME:identity-access-service}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${IDENTITY_DB_URL:${DB_URL:jdbc:mysql://localhost:33061/banquito_identity_access_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Guayaquil}}
    username: ${IDENTITY_DB_USER:${DB_USERNAME:root}}
    password: ${IDENTITY_DB_PASSWORD:${DB_PASSWORD:BanQuitoRoot2026!}}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:2}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl
    properties:
      hibernate:
        format_sql: ${HIBERNATE_FORMAT_SQL:true}
        jdbc:
          time_zone: ${APP_TIMEZONE:America/Guayaquil}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: ${FLYWAY_BASELINE_VERSION:1}
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: ${ACTUATOR_ENDPOINTS:health,info}
  endpoint:
    health:
      show-details: ${ACTUATOR_HEALTH_DETAILS:always}
  health:
    db:
      enabled: true

springdoc:
  api-docs:
    path: ${OPENAPI_DOCS_PATH:/api-docs}
  swagger-ui:
    path: ${SWAGGER_UI_PATH:/swagger-ui.html}

banquito:
  security:
    jwt:
      issuer: ${JWT_ISSUER:banquito-identity-access}
      secret: ${JWT_SECRET:BanQuitoIdentityJwtSecretKeyForDevelopmentOnlyChangeMe2026}
      access-token-minutes: ${ACCESS_TOKEN_MINUTES:15}
      refresh-token-days: ${REFRESH_TOKEN_DAYS:7}
  demo:
    enabled: ${DEMO_DATA_ENABLED:true}
    password: ${DEMO_PASSWORD:password}
  onboarding:
    customer-activation-base-url: ${BANQUITO_CUSTOMER_ACTIVATION_BASE_URL:http://localhost:5174/activar}
  integrations:
    admin:
      base-url: ${ADMIN_SERVICE_BASE_URL:http://localhost:8083}
    notification:
      base-url: ${NOTIFICATION_SERVICE_BASE_URL:http://localhost:8087}
  internal:
    service-key: ${INTERNAL_SERVICE_KEY:banquito-internal-development-key}
  integration:
    outbox:
      enabled: ${IDENTITY_OUTBOX_ENABLED:true}
      batch-size: ${IDENTITY_OUTBOX_BATCH_SIZE:20}
      max-attempts: ${IDENTITY_OUTBOX_MAX_ATTEMPTS:5}
      fixed-delay-ms: ${IDENTITY_OUTBOX_FIXED_DELAY_MS:5000}
